services:
  postgres:
    image: postgres:16-alpine
    container_name: hub_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hub_redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: hub_backend
    restart: always
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run start"]
    env_file:
      - ../.env
    environment:
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      DB_HOST: postgres
      DB_PORT: 5432
    volumes:
      - ../backend:/app
    ports:
      - "${API_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4000/health | grep -q '\"ok\":true'"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    image: node:20-alpine
    container_name: hub_worker
    restart: always
    working_dir: /app
    command: ["sh", "-c", "echo 'Worker placeholder activo'; sleep infinity"]
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    volumes:
      - ../worker:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -d /app"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    image: node:20-alpine
    container_name: hub_frontend
    restart: always
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run start"]
    env_file:
      - ../.env
    environment:
      APP_PORT: ${APP_PORT:-3000}
      API_BASE_URL: http://backend:${API_PORT:-4000}
    volumes:
      - ../frontend:/app
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/health | grep -q '\"ok\":true'"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
