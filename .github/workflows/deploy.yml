name: Deploy VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "${VPS_HOST}" || (echo "Falta secret VPS_HOST" && exit 1)
          test -n "${VPS_SSH_KEY}" || (echo "Falta secret VPS_SSH_KEY" && exit 1)
          mkdir -p ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          ssh-keyscan -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PROJECT_PATH: ${{ secrets.VPS_PROJECT_PATH }}
        run: |
          test -n "${VPS_USER}" || (echo "Falta secret VPS_USER" && exit 1)
          test -n "${VPS_PROJECT_PATH}" || (echo "Falta secret VPS_PROJECT_PATH" && exit 1)
          ssh "${VPS_USER}@${VPS_HOST}" "cd ${VPS_PROJECT_PATH} && \
          git status --porcelain && \
          test -z \"\$(git status --porcelain)\" && \
          git pull --ff-only origin main && \
          bash infra/deploy.sh && \
          bash infra/migrate.sh && \
          bash infra/healthcheck.sh"
